{% extends "base_auth.html" %}

{% block title %}Create Account{% endblock %}

{% block auth_content %}
  <h2 class="lc-title">Create your account ✨</h2>
  <p class="lc-sub">Join CareerVerse AI and start analyzing your documents.</p>

  <!-- ============================================================
       REGISTER FORM
       BACKEND NOTE: This form submits via POST to /register
       Flask should:
         1. Validate name, email, password, confirm_password
         2. Check email isn't already registered
         3. Hash the password (e.g. werkzeug.security.generate_password_hash)
         4. Insert a new row into the users table
         5. Create a session and redirect to /dashboard
       On validation failure, use flash('message', 'error')
       which main.js will render as a toast.
       ============================================================ -->
  <form class="login-form" id="register-form" method="POST" action="{{ url_for('register') }}">

    <!-- Full Name -->
    <div class="form-group">
      <label class="form-label" for="register-name">Full Name</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input id="register-name" name="name" class="form-input" type="text" placeholder="Divya Sharma" autocomplete="name" required />
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="register-email">Email Address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input id="register-email" name="email" class="form-input" type="email" placeholder="divya@example.com" autocomplete="email" required />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="register-password">Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="register-password" name="password" class="form-input" type="password" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8" />
        <span class="input-right-icon" onclick="togglePassword('register-password','eye-icon-1')" id="pw-toggle-1">
          <svg id="eye-icon-1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label class="form-label" for="register-confirm-password">Confirm Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="register-confirm-password" name="confirm_password" class="form-input" type="password" placeholder="Repeat your password" autocomplete="new-password" required minlength="8" />
        <span class="input-right-icon" onclick="togglePassword('register-confirm-password','eye-icon-2')" id="pw-toggle-2">
          <svg id="eye-icon-2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
    </div>

    <!-- Terms checkbox -->
    <div class="remember-row">
      <label class="checkbox-label">
        <input type="checkbox" id="agree-terms" name="agree_terms" required />
        <span>I agree to the Terms &amp; Privacy Policy</span>
      </label>
    </div>

    <!-- Register CTA -->
    <button class="btn btn-primary btn-full btn-lg" type="submit" id="register-submit-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      Create Account
    </button>

    <!-- Divider -->
    <div class="login-divider">or sign up with</div>

    <!-- Social signup — UI placeholders only, no OAuth implementation -->
    <div class="social-btns">
      <button type="button" class="social-btn" onclick="showToast('info','Google Sign-Up','OAuth integration goes here.')">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button type="button" class="social-btn" onclick="showToast('info','GitHub Sign-Up','OAuth integration goes here.')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </button>
      <button type="button" class="social-btn" onclick="showToast('info','LinkedIn Sign-Up','OAuth integration goes here.')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#0A66C2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        LinkedIn
      </button>
    </div>

    <p class="create-link">
      Already have an account? <a href="{{ url_for('login') }}"><span>Sign In</span></a>
    </p>
  </form>
{% endblock %}
