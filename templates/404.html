<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · CareerVerse AI</title>

  <!-- ============================================================
       GOOGLE FONTS: Poppins + Inter
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ============================================================
       GLOBAL STYLESHEET
       ============================================================ -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ============================================================
       404 PAGE
       Standalone — no sidebar, no navbar. Rendered by Flask's
       @app.errorhandler(404) in app.py.
       ============================================================ -->
  <div class="notfound-wrap">
    <div class="notfound-code">404</div>
    <h2 class="notfound-title">Page Not Found</h2>
    <p class="notfound-sub">The page you're looking for doesn't exist or has been moved.</p>

    <!-- BACKEND NOTE: url_for('dashboard') requires an active
         session; if the user isn't logged in, Flask's
         login_required decorator will redirect them to /login
         instead, which is the correct fallback behavior. -->
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Go to Dashboard
    </a>
  </div>

</body>
</html>vv
